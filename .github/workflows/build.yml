name: Build Mihomo Rule Sets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rules/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yq for YAML parsing
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Prepare output directories
        run: |
          mkdir -p output/classical output/ipcidr

      - name: Copy domain rules
        run: |
          # 直接复制 YAML 规则文件
          for file in rules/domain/*.yaml; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .yaml)
            cp "$file" "output/classical/${name}.yaml"
            echo "✓ Copied: classical/${name}.yaml"
          done

      - name: Copy IP rules
        run: |
          # 复制 IP 规则
          for file in rules/ip/*.yaml; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .yaml)
            cp "$file" "output/ipcidr/${name}.yaml"
            echo "✓ Copied: ipcidr/${name}.yaml"
          done

      - name: Generate checksums
        run: |
          cd output
          find . -type f -name "*.yaml" \
            -exec sha256sum {} \; > checksums.txt
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Publish to release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd output
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Release $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd output
          gh release delete latest --cleanup-tag -y 2>/dev/null || true
          BUILDTIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')
          
          FILES=""
          [ -d "classical" ] && FILES="$FILES classical/*"
          [ -d "ipcidr" ] && FILES="$FILES ipcidr/*"
          [ -f "checksums.txt" ] && FILES="$FILES checksums.txt"
          
          if [ -n "$FILES" ]; then
            gh release create latest \
              --title "Rule Sets ${BUILDTIME}" \
              --generate-notes \
              $FILES
          fi

      - name: Purge jsDelivr cache
        run: |
          for file in output/classical/*.yaml; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            echo "Purging cache: $name"
            curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/classical/${name}" || true
          done
