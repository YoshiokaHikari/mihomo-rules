name: Build Mihomo Rule Sets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rules/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download mihomo
        run: |
          curl -sL "https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64-compatible.gz" | gunzip > /usr/local/bin/mihomo
          chmod +x /usr/local/bin/mihomo
          mihomo -v

      - name: Convert .list to .mrs
        run: |
          mkdir -p release/rules/domain release/rules/ip
          
          # 转换 domain 规则
          for file in rules/domain/*.list; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .list)
            # 去掉注释和空行，生成干净的临时文件
            grep -v '^#' "$file" | grep -v '^$' > "/tmp/${name}.txt"
            # 转换为 MRS
            mihomo convert-ruleset domain text "/tmp/${name}.txt" "release/rules/domain/${name}.mrs"
            echo "✓ MRS: rules/domain/${name}.mrs ($(wc -l < "/tmp/${name}.txt") rules)"
            # 复制原始 .list 文件
            cp "$file" "release/rules/domain/${name}.list"
            echo "✓ LIST: rules/domain/${name}.list"
          done
          
          # 转换 ip 规则
          for file in rules/ip/*.list; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .list)
            grep -v '^#' "$file" | grep -v '^$' > "/tmp/${name}.txt"
            mihomo convert-ruleset ipcidr text "/tmp/${name}.txt" "release/rules/ip/${name}.mrs"
            echo "✓ MRS: rules/ip/${name}.mrs ($(wc -l < "/tmp/${name}.txt") rules)"
            cp "$file" "release/rules/ip/${name}.list"
            echo "✓ LIST: rules/ip/${name}.list"
          done

      - name: Verify MRS files
        run: |
          echo "=== MRS files ==="
          find release -name "*.mrs" -exec ls -la {} \;
          echo ""
          echo "=== LIST files ==="
          find release -name "*.list" -exec ls -la {} \;

      - name: Push to release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Release $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f -u origin release
          echo "✅ Published to release branch"

      - name: Purge jsDelivr cache
        run: |
          for file in release/rules/domain/*.mrs; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/rules/domain/${name}" || true
          done
          for file in release/rules/domain/*.list; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/rules/domain/${name}" || true
          done
