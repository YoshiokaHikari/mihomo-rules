name: Build Mihomo Rule Sets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rules/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare output
        run: |
          mkdir -p output/classical output/ipcidr
          
          # 复制域名规则
          for file in rules/domain/*.yaml; do
            [ -f "$file" ] || continue
            cp "$file" "output/classical/$(basename "$file")"
            echo "✓ $(basename "$file")"
          done
          
          # 复制 IP 规则
          for file in rules/ip/*.yaml; do
            [ -f "$file" ] || continue
            cp "$file" "output/ipcidr/$(basename "$file")"
            echo "✓ $(basename "$file")"
          done

      - name: Push to release branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd output
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Release $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git push -f -u origin release
          echo "✅ Published to release branch"

      - name: Purge jsDelivr cache
        run: |
          for file in output/classical/*.yaml; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/classical/${name}" || true
          done
